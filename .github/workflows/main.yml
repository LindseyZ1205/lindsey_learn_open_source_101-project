---
name: CI

on:
  workflow_dispatch:

env:
  PACKAGE_NAME: "lindsey_learn_open_source_101"

jobs:
  tests:
    name: "${{ matrix.os }} Python ${{ matrix.python-version }}"
    runs-on: "${{ matrix.os }}"
    env:
      USING_COVERAGE: "3.10,3.11,3.12,3.13"
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "${{ matrix.python-version }}"
      - name: "Install uv"
        uses: "astral-sh/setup-uv@v4"
      - name: "Cache venv"
        uses: "actions/cache@v4"
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
      - name: "Install dependencies"
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: uv sync --extra test
      - name: "Run pytest"
        run: "uv run pytest tests --cov=${{ env.PACKAGE_NAME }} --cov-report=xml --cov-report term-missing"
      - name: "Upload coverage to Codecov"
        if: "contains(env.USING_COVERAGE, matrix.python-version)"
        uses: "codecov/codecov-action@v4"
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          file: ./coverage.xml
          verbose: true
          fail_ci_if_error: true
