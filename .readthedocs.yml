# ReadTheDocs configuration file
# See: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# Build environment
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Sphinx config
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

# Build PDF and HTML
formats:
  - htmlzip

# Install the package + doc dependencies so Sphinx can import it
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
